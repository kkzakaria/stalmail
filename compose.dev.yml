# Stalmail dev stack — same topology as prod, but the app runs Vite/HMR against the
# live source. `docker compose -f compose.dev.yml up` then open https://localhost
# (Caddy, self-signed) or http://localhost:3000 (app direct). Fresh Stalwart volumes
# → bootstrap mode → full wizard incl. the bootstrap→normal restart via the supervisor.
services:
  stalwart:
    build:
      context: .
      dockerfile: docker/stalwart/Dockerfile
    environment:
      STALWART_RECOVERY_ADMIN: "stalmail-admin:dev-insecure-secret"
      STALMAIL_RUN_DIR: /shared
    volumes:
      - stalmail-dev-config:/etc/stalwart
      - stalmail-dev-data:/var/lib/stalwart
      - stalmail-dev-shared:/shared
    networks: [stalmail]

  # One-shot installer on the HOST network. The Docker bridge (veth/NAT) on WSL2
  # corrupts bun's high-concurrency downloads (IntegrityCheckFailed/hang); bypassing
  # it with the host network makes `bun install` reliable. It populates the shared
  # node_modules volume, then exits — the app reuses it.
  # See docs/troubleshooting/wsl2-docker-bun-install-network-corruption.md
  installer:
    image: oven/bun:1
    network_mode: host
    working_dir: /app
    command: sh -c "bun install"
    volumes:
      - .:/app
      - stalmail-dev-modules:/app/node_modules

  app:
    image: oven/bun:1
    working_dir: /app
    # No install here — the installer already populated node_modules. Just run Vite.
    command: sh -c "bun run dev --host"
    environment:
      STALWART_URL: http://stalwart:8080
      STALWART_RECOVERY_ADMIN: "stalmail-admin:dev-insecure-secret"
      STALMAIL_SECRET: "dev-insecure-secret"
      STALMAIL_DATA_DIR: /var/lib/stalmail
      STALMAIL_PUBLIC_URL: "http://localhost:3000"
      STALMAIL_RUN_DIR: /shared
    volumes:
      - .:/app
      - stalmail-dev-modules:/app/node_modules
      - stalmail-dev-shared:/shared
      - stalmail-dev-app-data:/var/lib/stalmail
    ports:
      - "3000:3000"
    depends_on:
      stalwart:
        condition: service_started
      installer:
        condition: service_completed_successfully
    networks: [stalmail]

  caddy:
    image: caddy:2.9.1
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on: [app, stalwart]
    networks: [stalmail]

networks:
  stalmail:

volumes:
  stalmail-dev-config:
  stalmail-dev-data:
  stalmail-dev-shared:
  stalmail-dev-modules:
  stalmail-dev-app-data:
