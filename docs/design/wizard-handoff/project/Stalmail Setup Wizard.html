<!--
  Stalmail Setup Wizard — prototype interactif (Plan 2b)

  Hypothèses & raisonnement :
  • Base visuelle : shadcn neutre (zinc), accent bleu oklch(0.55 0.15 250), type Geist + Geist Mono.
  • Les 9 écrans du plan 2b, enchaînés, avec l'écran de redémarrage entre 5 et 6.
  • Phase collecte : validation locale (regex ~zod) ; phase monitoring : simulations temporisées
    (création compte, grille DNS progressive, task ACME).
  • Disposition retenue : Carte centrée. Sélecteur de langue (extensible) + switch de thème en en-tête.
  • Tweaks : accent, « Simuler des erreurs », vitesse, reset. État persisté en localStorage.
  • CSS partagé avec la page de connexion : wizard/styles.css
-->
